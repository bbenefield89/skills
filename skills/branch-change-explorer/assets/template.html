<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1d2129; --border:#2a2f3a;
    --text:#e6e9ef; --muted:#9aa4b2; --accent:#6ea8fe;
    --add:#7ee787; --mod:#ffcb6b; --del:#ff7b72; --chip:#232833; --kw:#d2a8ff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f6f7f9; --panel:#fff; --panel2:#eef1f5; --border:#dfe3ea;
      --text:#1b1f27; --muted:#5c6673; --accent:#1c64f2;
      --add:#1a7f37; --mod:#9a6700; --del:#cf222e; --chip:#eef1f5; --kw:#8250df;
    }
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column;
  }
  header { padding:16px 22px; border-bottom:1px solid var(--border); background:var(--panel); }
  header h1 { margin:0 0 3px; font-size:18px; letter-spacing:-.01em; }
  header .sub { color:var(--muted); font-size:13px; }
  header .sub b { color:var(--text); font-family:ui-monospace,Menlo,monospace; font-weight:600; }
  header .overview { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  header .overview section { background:var(--panel2); border:1px solid var(--border); border-radius:7px; padding:9px 11px; }
  header .overview h2 { margin:0 0 3px; color:var(--accent); font-size:11px; letter-spacing:.06em; text-transform:uppercase; }
  header .overview p { margin:0; color:var(--text); font-size:13px; line-height:1.45; }
  header .overview ul { margin:0; padding-left:18px; color:var(--text); font-size:13px; line-height:1.45; }
  header .overview li { margin:3px 0; }
  header .overview code { font-family:ui-monospace,Menlo,monospace; font-size:.9em; background:var(--chip); padding:1px 5px; border-radius:4px; }
  header .legend { margin-top:8px; font-size:12px; color:var(--muted); }
  .legend b { font-family:ui-monospace,Menlo,monospace; }
  .legend .A { color:var(--add); } .legend .M { color:var(--mod); } .legend .D { color:var(--del); }
  main { flex:1; display:flex; min-height:0; }
  #tree {
    width:390px; min-width:300px; max-width:52%; overflow:auto; padding:14px 10px 40px;
    border-right:1px solid var(--border); background:var(--panel); resize:horizontal;
  }
  #detail { flex:1; overflow:auto; padding:26px 30px 60px; }
  ul.tree, ul.tree ul { list-style:none; margin:0; padding:0; }
  ul.tree ul { margin-left:14px; border-left:1px dashed var(--border); padding-left:8px; }
  li { margin:1px 0; }
  .node {
    display:flex; align-items:center; gap:7px; padding:3px 7px; border-radius:6px;
    cursor:pointer; white-space:nowrap; user-select:none;
  }
  .node:hover { background:var(--panel2); }
  .node.dir { color:var(--text); font-weight:600; }
  .node.file { color:var(--muted); }
  .node.sel { background:var(--accent); color:#fff; }
  .node.sel .badge { background:rgba(255,255,255,.25); color:#fff; }
  .caret { width:12px; display:inline-block; transition:transform .12s; color:var(--muted); }
  .collapsed > .caret { transform:rotate(-90deg); }
  .collapsed + ul { display:none; }
  .badge {
    font-family:ui-monospace,Menlo,monospace; font-size:10px; font-weight:700;
    width:16px; text-align:center; border-radius:4px; background:var(--chip); flex:none;
  }
  .badge.A { color:var(--add); } .badge.M { color:var(--mod); } .badge.D { color:var(--del); }
  .fname { overflow:hidden; text-overflow:ellipsis; }
  .empty { color:var(--muted); margin-top:40px; text-align:center; }
  #detail h2 { margin:0 0 2px; font-size:20px; }
  #detail .path { font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted); word-break:break-all; }
  #detail .status-pill {
    display:inline-block; margin:10px 0 20px; padding:3px 11px; border-radius:20px;
    font-size:12px; font-weight:600; background:var(--chip);
  }
  .status-pill.A { color:var(--add); } .status-pill.M { color:var(--mod); } .status-pill.D { color:var(--del); }
  #detail h3 {
    font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
    margin:22px 0 7px; border-bottom:1px solid var(--border); padding-bottom:5px;
  }
  #detail p { margin:0 0 8px; }
  #detail ul.changes { margin:0 0 8px; padding-left:20px; }
  #detail ul.changes li { margin:4px 0; }
  #detail code { font-family:ui-monospace,Menlo,monospace; font-size:.88em; background:var(--chip); padding:1px 5px; border-radius:4px; }
  pre {
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; overflow:auto; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:12.5px; line-height:1.5; white-space:pre;
  }
  pre code { background:none; padding:0; font-size:1em; }
  pre .c { color:var(--muted); }
  pre .str { color:var(--add); }
  pre .num { color:var(--mod); }
  pre .kw { color:var(--kw); font-weight:600; }
  pre .fn { color:var(--accent); }
  .hint { color:var(--muted); font-size:12px; margin-top:16px; }
  kbd { font-family:ui-monospace,Menlo,monospace; background:var(--chip); border:1px solid var(--border); border-radius:4px; padding:0 5px; font-size:12px; }
  @media (max-width: 760px) { header .overview { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>__TITLE__</h1>
  <div class="sub">Changes on <b>__HEAD__</b> vs <b>__BASE__</b> · <span id="count"></span></div>
  <div class="overview">
    <section>
      <h2>Goal</h2>
      __GOAL__
    </section>
    <section>
      <h2>Implemented</h2>
      __IMPLEMENTED__
    </section>
  </div>
  <div class="legend"><b class="A">A</b> added &nbsp; <b class="M">M</b> modified &nbsp; <b class="D">D</b> deleted &nbsp;·&nbsp; <kbd>↑</kbd><kbd>↓</kbd> to move between files</div>
</header>
<main>
  <div id="tree"></div>
  <div id="detail"><div class="empty">Select a file in the tree to see what changed and why.</div></div>
</main>

<script>
const DATA = __DATA__;

const files = DATA.files;
const byPath = Object.fromEntries(files.map(f => [f.path, f]));
const order = files.map(f => f.path);
const counts = files.reduce((a,f)=>(a[f.status]=(a[f.status]||0)+1,a),{});
document.getElementById("count").textContent =
  [["A","added"],["M","modified"],["D","deleted"]]
    .filter(([k])=>counts[k]).map(([k,l])=>`${counts[k]} ${l}`).join(" · ");

// ---- build nested tree from paths ----
const root = { children:{} };
for (const f of files) {
  const parts = f.path.split("/");
  let node = root;
  parts.forEach((p,i) => {
    const isFile = i === parts.length - 1;
    node.children[p] = node.children[p] || (isFile ? { file:true, ...f } : { dir:true, name:p, children:{} });
    node = node.children[p];
  });
}

const treeEl = document.getElementById("tree");
const nodeEls = {};

function render(node, container, top) {
  const names = Object.keys(node.children).sort((a,b) => {
    const A = node.children[a], B = node.children[b];
    if (!!A.dir !== !!B.dir) return A.dir ? -1 : 1;   // directories first
    return a.localeCompare(b);
  });
  const ul = document.createElement("ul");
  if (top) ul.className = "tree";
  for (const name of names) {
    const child = node.children[name];
    const li = document.createElement("li");
    const div = document.createElement("div");
    if (child.dir) {
      div.className = "node dir";
      div.innerHTML = `<span class="caret">▾</span><span class="fname">${name}/</span>`;
      div.onclick = () => div.classList.toggle("collapsed");
      li.appendChild(div);
      render(child, li, false);
    } else {
      div.className = "node file";
      div.innerHTML =
        `<span class="caret" style="visibility:hidden">▾</span>` +
        `<span class="badge ${child.status}">${child.status}</span>` +
        `<span class="fname">${name}</span>`;
      div.onclick = () => select(child.path);
      nodeEls[child.path] = div;
      li.appendChild(div);
    }
    ul.appendChild(li);
  }
  container.appendChild(ul);
}
render(root, treeEl, true);

const detailEl = document.getElementById("detail");
const STAT = { A:"Added", M:"Modified", D:"Deleted" };
let current = null;

// Render a summary/why field: an array becomes a bullet list; a string a paragraph.
function block(field) {
  if (Array.isArray(field)) return `<ul class="changes">${field.map(x => `<li>${x}</li>`).join("")}</ul>`;
  return `<p>${field}</p>`;
}

// Lightweight pseudocode highlighter. Runs over TEXT NODES only, so it never
// touches author-supplied markup (e.g. existing <span class="c"> comments) or
// corrupts escaped entities. Heuristic by design — pseudocode is not a real
// language, so tokens are best-effort.
const HL_RE = new RegExp(
  "(\\/\\/[^\\n]*|#[^\\n]*)" +                              // 1 comment
  "|(\"(?:[^\"\\\\]|\\\\.)*\"|'(?:[^'\\\\]|\\\\.)*')" +     // 2 string
  "|(\\b\\d+(?:\\.\\d+)?\\b)" +                             // 3 number
  "|(\\b(?:if|else|for|foreach|return|func|type|struct|const|var|new|emit|assert|nil|true|false)\\b)" + // 4 keyword
  "|([A-Za-z_]\\w*)(?=\\s*\\()",                            // 5 function call
  "g");
const HL_CLASS = [null, "c", "str", "num", "kw", "fn"];

function highlightPre(pre) {
  const walker = document.createTreeWalker(pre, NodeFilter.SHOW_TEXT);
  const targets = [];
  while (walker.nextNode()) {
    const n = walker.currentNode;
    if (n.parentElement.closest(".c,.str,.num,.kw,.fn")) continue; // leave tagged text alone
    if (n.nodeValue.trim()) targets.push(n);
  }
  for (const node of targets) {
    const text = node.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    HL_RE.lastIndex = 0;
    while ((m = HL_RE.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const gi = [1, 2, 3, 4, 5].find(i => m[i] !== undefined);
      const span = document.createElement("span");
      span.className = HL_CLASS[gi];
      span.textContent = m[gi];          // textContent auto-escapes
      frag.appendChild(span);
      last = m.index + m[0].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}

function select(path) {
  const f = byPath[path];
  if (!f) return;
  if (current && nodeEls[current]) nodeEls[current].classList.remove("sel");
  current = path;
  const el = nodeEls[path];
  el.classList.add("sel");
  el.scrollIntoView({ block:"nearest" });
  detailEl.innerHTML =
    `<h2>${path.split("/").pop()}</h2>` +
    `<div class="path">${path}</div>` +
    `<span class="status-pill ${f.status}">${STAT[f.status]}</span>` +
    `<h3>What changed</h3>${block(f.summary)}` +
    `<h3>Why</h3>${block(f.why)}` +
    `<h3>Pseudocode</h3><pre><code>${f.pseudo}</code></pre>`;
  const pre = detailEl.querySelector("pre");
  if (pre) highlightPre(pre);
  detailEl.scrollTop = 0;
}

document.addEventListener("keydown", e => {
  if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
  e.preventDefault();
  const i = current ? order.indexOf(current) : -1;
  const next = e.key === "ArrowDown" ? Math.min(order.length-1, i+1) : Math.max(0, i-1);
  select(order[next]);
});
</script>
</body>
</html>
